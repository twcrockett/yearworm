<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Challenge — Yearworm</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&family=Familjen+Grotesk:wght@400;500;600;700&family=Rampart+One&display=swap" rel="stylesheet">
</head>
<body>

  <div id="game-app" data-view="game">

    <!-- Persistent header — hidden on results screen via CSS -->
    <header class="game-header">
      <a href="/" class="game-back-link">← Home</a>
      <div class="worm-bar">
        <div class="worm-face state-happy" id="worm-face">😊</div>
        <div class="worm-segments" id="worm-segments"></div>
        <div class="worm-score-num" id="worm-score">100</div>
      </div>
      <div class="round-progress" id="progress-dots">
        <div class="dot" data-round="1"></div>
        <div class="dot" data-round="2"></div>
        <div class="dot" data-round="3"></div>
        <div class="dot" data-round="4"></div>
        <div class="dot" data-round="5"></div>
      </div>
    </header>

    <!-- ── View 1: Active game ──────────────────────────────── -->
    <section id="view-game" class="game-view">

      <div id="audio-wrapper">
        <!-- Custom audio player injected here by JS -->
      </div>

      <div class="guess-section">
        <div class="guess-row">
          <input type="number" id="year-guess" class="year-input"
                 placeholder="year" min="1900" max="2030" autocomplete="off">
          <button id="guess-btn" class="guess-btn">Guess</button>
          <button id="skip-btn" class="skip-btn">Skip</button>
        </div>
        <div class="input-error" id="input-error"></div>
      </div>

      <div class="song-info-bar" id="song-info-bar">
        <div class="song-info-item" id="title-item">
          <div class="info-label">Title</div>
          <div class="info-value unknown" id="title-display">?</div>
        </div>
        <div class="song-info-item" id="artist-item">
          <div class="info-label">Artist</div>
          <div class="info-value unknown" id="artist-display">?</div>
        </div>
      </div>

    </section>

    <!-- ── View 2: Round result ─────────────────────────────── -->
    <section id="view-round-result" class="game-view">
      <div class="round-result-card">

        <div>
          <div class="result-song-title" id="result-title"></div>
          <div class="result-song-artist" id="result-artist"></div>
        </div>

        <div class="result-year-row">
          <div class="result-actual-year" id="result-year"></div>
          <div class="result-year-label">was the year</div>
        </div>

        <div class="timeline-container">
          <div class="timeline-range"><span>1950</span><span>2024</span></div>
          <div class="timeline-track" id="timeline-track">
            <div class="timeline-rail"></div>
            <div class="timeline-distance" id="timeline-distance"></div>
            <div class="timeline-marker marker-guess" id="marker-guess">
              <div class="marker-pin"></div>
              <div class="marker-label" id="marker-guess-label">your guess</div>
            </div>
            <div class="timeline-marker marker-actual" id="marker-actual">
              <div class="marker-pin"></div>
              <div class="marker-label">actual</div>
            </div>
          </div>
        </div>

        <div class="result-feedback-text" id="result-feedback"></div>
        <div class="apple-music-link" id="apple-music-link"></div>
        <button class="next-btn" id="next-round-btn">Next →</button>

      </div>
    </section>

    <!-- ── View 3: Results ──────────────────────────────────── -->
    <section id="view-results" class="game-view">

      <div class="results-header">
        <div class="results-worm" id="results-worm">🐛</div>
        <div class="results-score-label">Final Score</div>
        <div class="results-score-num" id="results-score">—</div>
        <div class="results-message" id="results-message"></div>
        <div class="already-played-banner" id="already-played-banner">you already played today</div>
      </div>

      <div class="rounds-summary">
        <div class="rounds-summary-label">How you did</div>
        <div id="rounds-list"></div>
      </div>

      <div class="results-actions">
        <button class="btn-primary copy-btn" id="copy-results-btn">📋 Copy Results</button>
        <div class="copy-success" id="copy-success"></div>
        <a href="/daily" class="btn-secondary">Play Again</a>
        <a href="/free_options" class="btn-secondary">Try Free Play</a>
        <a href="/" class="btn-secondary">Home</a>
      </div>

    </section>

  </div><!-- #game-app -->

  <script src="/static/common.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      injectNavbar();
      document.body.insertAdjacentHTML('beforeend', footerHTML);

      const game = new YearwormGame({ mode: 'daily' });

      game.initialize({
        wormFace:       document.getElementById('worm-face'),
        wormSegments:   document.getElementById('worm-segments'),
        wormScoreNum:   document.getElementById('worm-score'),
        progressDots:   document.querySelectorAll('#progress-dots .dot'),
        audioWrapper:   document.getElementById('audio-wrapper'),
        yearInput:      document.getElementById('year-guess'),
        guessBtn:       document.getElementById('guess-btn'),
        skipBtn:        document.getElementById('skip-btn'),
        inputError:     document.getElementById('input-error'),
        titleDisplay:   document.getElementById('title-display'),
        artistDisplay:  document.getElementById('artist-display'),
        titleItem:      document.getElementById('title-item'),
        artistItem:     document.getElementById('artist-item'),
        resultTitle:    document.getElementById('result-title'),
        resultArtist:   document.getElementById('result-artist'),
        resultYear:     document.getElementById('result-year'),
        timelineTrack:  document.getElementById('timeline-track'),
        timelineDist:   document.getElementById('timeline-distance'),
        markerGuess:    document.getElementById('marker-guess'),
        markerGuessLbl: document.getElementById('marker-guess-label'),
        markerActual:   document.getElementById('marker-actual'),
        resultFeedback: document.getElementById('result-feedback'),
        appleMusicLink: document.getElementById('apple-music-link'),
        nextRoundBtn:   document.getElementById('next-round-btn'),
        resultsWorm:    document.getElementById('results-worm'),
        resultsScore:   document.getElementById('results-score'),
        resultsMessage: document.getElementById('results-message'),
        alreadyBanner:  document.getElementById('already-played-banner'),
        roundsList:     document.getElementById('rounds-list'),
        copyBtn:        document.getElementById('copy-results-btn'),
        copySuccess:    document.getElementById('copy-success'),
      });

      game.start();
    });
  </script>
</body>
</html>
