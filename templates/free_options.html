<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Free Play Options — Yearworm</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&family=Familjen+Grotesk:wght@400;500;600;700&family=Rampart+One&display=swap" rel="stylesheet">
</head>
<body>

  <div class="options-page">
    <h1>Free Play</h1>
    <p class="page-tagline">Set your rules. Then go wild.</p>

    <div class="options-card">

      <div class="option-group">
        <div class="option-group-label">Game Mode</div>
        <div class="pill-options">
          <div class="pill-option">
            <input type="radio" id="mode-normal" name="game-mode" value="normal" checked>
            <label for="mode-normal">Normal — ends when score hits zero</label>
          </div>
          <div class="pill-option">
            <input type="radio" id="mode-unlimited" name="game-mode" value="unlimited">
            <label for="mode-unlimited">Unlimited — just keep going</label>
          </div>
        </div>
      </div>

      <div class="option-group">
        <div class="option-group-label">Hints</div>
        <div class="pill-options">
          <div class="pill-option">
            <input type="checkbox" id="enable-hints">
            <label for="enable-hints">Allow hints (title &amp; artist)</label>
          </div>
        </div>
      </div>

      <div class="option-group">
        <div class="option-group-label">Guesses per song</div>
        <div class="pill-options">
          <div class="pill-option">
            <input type="radio" id="guess-one" name="guesses" value="one" checked>
            <label for="guess-one">One shot</label>
          </div>
          <div class="pill-option">
            <input type="radio" id="guess-unlimited" name="guesses" value="unlimited">
            <label for="guess-unlimited">Keep guessing until right</label>
          </div>
        </div>
      </div>

    </div>

    <button id="start-btn" class="start-btn">Start Playing →</button>
    <br>
    <a href="/" class="back-link">← Back to Home</a>
  </div>

  <script src="/static/common.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      injectNavbar();
      document.body.insertAdjacentHTML('beforeend', footerHTML);

      document.getElementById('start-btn').addEventListener('click', function () {
        const unlimitedMode   = document.getElementById('mode-unlimited').checked;
        const hintsEnabled    = document.getElementById('enable-hints').checked;
        const unlimitedGuesses = document.getElementById('guess-unlimited').checked;
        window.location.href = '/free?hints=' + hintsEnabled +
                               '&unlimited=' + unlimitedGuesses +
                               '&unlimited_mode=' + unlimitedMode;
      });
    });
  </script>
</body>
</html>
