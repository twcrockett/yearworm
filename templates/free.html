<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Play - Yearworm</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Familjen+Grotesk:wght@400;500;600;700&family=Rampart+One&display=swap" rel="stylesheet">
</head>
<body>
    <div class="page-header">
        <span class="font-icon free-icon">♫</span>
        <h1>Free Play</h1>
        <h2 id="mode-subtitle"></h2>
    </div>

    <div class="game-container">
        <div class="game-header">
            <div class="round">Round: <b id="current-round">1</b></div>
            <div id="score-container" class="score">
                <span class="score-label">Score:</span>
                <div class="score-circle">
                    <span class="score-value" id="score">100</span>
                </div>
            </div>
            <div id="avg-container" class="score" style="display: none;">
                <span class="score-label">Avg:</span>
                <div class="score-circle">
                    <span class="score-value" id="avg-years-off">0</span>
                </div>
            </div>
        </div>

        <div class="song-info-bar" id="song-info-bar">
            <div class="song-info-item title">
                <div class="item-label">Title</div>
                <span id="title-display" class="unknown"></span>
                <button id="title-hint-btn" class="hint-icon" style="display: none;">?</button>
            </div>
            <div class="song-info-item artist">
                <div class="item-label">Artist</div>
                <span id="artist-display" class="unknown"></span>
                <button id="artist-hint-btn" class="hint-icon" style="display: none;">?</button>
            </div>
            <div class="song-info-item year">
                <div class="item-label">Year</div>
                <span id="year-display" class="unknown"></span>
            </div>
        </div>

        <div class="player-container" id="player">
            <!-- The song player will be injected here -->
            <p>Loading song...</p>
        </div>

        <!-- Game Over Modal -->
        <div class="game-over-overlay" id="game-over-overlay" style="display: none;">
            <div class="game-over" id="game-over">
                <h3>Game Over!</h3>
                <p>Your score dropped below zero.</p>
                <div class="final-result">
                    <p>You survived <span id="final-rounds">0</span> rounds</p>
                    <p>Final score: <span id="final-score">0</span></p>
                </div>

                <!-- New song history section -->
                <div class="song-history-container">
                    <h4>Song History</h4>
                    <div class="song-history-list" id="song-history-list">
                        <!-- Song history items will be inserted here -->
                    </div>
                </div>

                <div class="game-over-actions">
                    <a href="/free" class="restart-btn">Play Again</a>
                    <a href="/free_options" class="restart-btn">Change Options</a>
                    <a href="/" class="home-btn">Back to Home</a>
                </div>
            </div>
        </div>
        <div class="next-song-arrow" id="next-btn">
            <span class="arrow">▶</span>
            <span class="text">Next</span>
        </div>
    </div>

    <!-- Navigation links moved outside of game container -->
    <div class="navigation-links">
        <a href="/" class="nav-btn">Back to Home</a>
        <a href="/free_options" class="nav-btn">Change Options</a>
    </div>

    <script src="/static/common.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            console.log("Free Play page loaded");

            // Get game options from URL parameters
            const urlParams = new URLSearchParams(window.location.search);
            const hintsEnabled = urlParams.get('hints') === 'true';
            const unlimitedGuesses = urlParams.get('unlimited') === 'true';
            const unlimitedMode = urlParams.get('unlimited_mode') === 'true';

            console.log("Game settings:", { hintsEnabled, unlimitedGuesses, unlimitedMode });

            // Update subtitle based on game mode
            const modeSubtitle = document.getElementById('mode-subtitle');
            if (modeSubtitle) {
                modeSubtitle.textContent = unlimitedMode ? "Unlimited Mode" : "Normal Mode";
            }

            // DOM elements for the game
            const elements = {
                // Game information elements
                currentRoundSpan: document.getElementById('current-round'),
                scoreSpan: document.getElementById('score'),
                scoreContainer: document.getElementById('score-container'),
                avgContainer: document.getElementById('avg-container'),
                avgYearsOffSpan: document.getElementById('avg-years-off'),

                // Song information elements
                playerContainer: document.getElementById('player'),
                songInfoBar: document.getElementById('song-info-bar'),
                titleDisplay: document.getElementById('title-display'),
                artistDisplay: document.getElementById('artist-display'),
                yearDisplay: document.getElementById('year-display'),
                guessFeedback: null, // Removed guess-feedback element

                // Hint buttons
                titleHintBtn: document.getElementById('title-hint-btn'),
                artistHintBtn: document.getElementById('artist-hint-btn'),

                // UI controls
                nextBtn: document.getElementById('next-btn'),

                // Game over elements
                gameOverOverlay: document.getElementById('game-over-overlay'),
                finalRoundsSpan: document.getElementById('final-rounds'),
                finalScoreSpan: document.getElementById('final-score'),
                songHistoryList: document.getElementById('song-history-list'),

                // Daily specific elements (not used in free play but needed for the constructor)
                progressDots: null,
                dailyCompletedDiv: null,
                previousScoreSpan: null,
                gameContent: null,
                gameOver: null,
                gameOverMessage: null,
                resultsGrid: null,
                copyResultsBtn: null,
                copySuccess: null
            };

            // Create a new game instance
            const game = new YearwormGame({
                mode: 'free',
                hintsEnabled,
                unlimitedGuesses,
                unlimitedMode
            });

            // Initialize the game
            game.initialize(elements);
            game.loadNewSong();
        });
    </script>
</body>
</html>
